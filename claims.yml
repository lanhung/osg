schema_version: 1
status: locked-for-implementation

paper1:
  working_title: >-
    Frequency-Coverage Limits in Assessing Gravity Signals from Oceanic Mass
    Redistribution
  claim: >-
    An evidence-bounded cross-process framework quantifies direct radial gravity
    signals from six representative oceanic process families and determines whether
    published instrument-noise evidence covers enough signal energy to authorize an
    SNR-based detectability classification.
  nearest_prior_work:
    - terrestrial gravity-fluctuation and Newtonian-noise reviews
    - superconducting-gravimeter ocean-loading studies
    - Helgoland non-tidal ocean-loading observations and models
    - Haikou iGrav-048 South China Sea non-tidal ocean-loading study (2026)
    - gravimeter and atom-interferometer sensitivity studies
  must_demonstrate:
    - common forward-model convention across six process families
    - explicit distinction between direct gravity and total terrestrial observables
    - effects of source geometry, distance, and mass compensation
    - a predeclared spectral-energy coverage gate
    - sensitivity of conclusions to the coverage threshold
    - independent open-model validation using the Helgoland case
    - reproducible derivation of all figures and reported numbers
  forbidden_claims:
    - a completed decision-grade detectability atlas
    - universal detectable or undetectable classifications
    - all process branches include elastic and height responses
    - 1446 independent natural events
    - first environmental Newtonian-noise model
    - first ocean-loading gravity calculation
    - facility specifications used as measured noise curves

paper2:
  working_title: Event-Resolved Gravimetric Detection of Typhoon-Driven Ocean Mass Redistribution
  claim: >-
    Event-resolved attribution of typhoon-driven ocean mass redistribution in
    superconducting-gravimeter observations, with separable physical contributions,
    multi-source validation, and held-out-event evaluation.
  nearest_prior_work:
    - Haikou iGrav-048 South China Sea non-tidal ocean-loading study (2026)
    - Helgoland non-tidal ocean-loading storm observations
    - Wuhan typhoon-period atmospheric gravity-admittance studies
  must_demonstrate:
    - typhoon-specific event attribution
    - direct-gravity, deformation, potential-response, atmosphere, and hydrology closure under severe weather
    - validation with independent tide-gauge, GNSS, pressure, typhoon-track, and ocean-product evidence
    - held-out-event or cross-station validation
    - explicit prevention of atmosphere-ocean double counting
  forbidden_claims:
    - first South China Sea non-tidal ocean-loading study
    - first typhoon gravimetry study
    - first typhoon-event extraction
    - first direct-Newtonian and elastic NTOL separation at Haikou
    - first CMEMS-versus-MPIOM comparison for South China Sea NTOL

paper3:
  working_title: Detectability and Warning Value of Prompt Elasto-Gravity Signals from Manila Trench Megathrust Earthquakes
  claim: >-
    Regional detectability and decision value of Manila Trench PEGS under realistic
    South China and surrounding network geometry, non-Gaussian noise, station outages,
    and explicit false-alarm constraints.
  nearest_prior_work:
    - PEGSGraph
    - Peru real-time PEGS tsunami-warning implementation
    - published Manila Trench tsunami scenario studies
  must_demonstrate:
    - realistic regional station availability and noise
    - detection probability as a function of time at fixed false-alarm rates
    - comparison with P-wave, W-phase, and GNSS characterization timelines
    - station-placement and outage sensitivity
    - held-out rupture segments and noise dates
    - continuous-stream alert false-alarm rate rather than only conditional magnitude accuracy
  forbidden_claims:
    - first PEGS tsunami-warning proposal
    - first Manila Trench tsunami simulation
    - PEGS is useful merely because it precedes tsunami arrival
    - first empirical-noise or graph-network treatment of PEGS
    - first real-time PEGS monitoring-system implementation
