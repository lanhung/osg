name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install locked-environment tool
        run: python -m pip install uv==0.8.24
      - name: Sync locked scientific environment
        run: uv sync --locked --python ${{ matrix.python-version }}
      - name: Run dependency-free foundation tests
        run: python -m unittest discover -s tests -p 'test_*.py'
      - name: Run complete locked-environment tests
        run: uv run pytest -q
      - name: Run Ruff lint and format checks
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Compile source tree
        run: python -m compileall -q src tests scripts
      - name: Validate registered experiment metadata and checksums
        run: python scripts/validate_experiment_registry.py

  paper1-journal-candidate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install LaTeX and locked Python environment
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-recommended
          python -m pip install uv==0.8.24
          uv sync --locked --python 3.13
      - name: Build and audit Journal of Geodesy candidate
        run: uv run python scripts/build_paper1_jog_release.py --candidate-audit
      - name: Upload candidate PDFs and build evidence
        uses: actions/upload-artifact@v4
        with:
          name: paper1-journal-candidate
          path: |
            papers/paper1_journal_of_geodesy/main.pdf
            papers/paper1_journal_of_geodesy/supplementary.pdf
            reports/paper1_jog_release_build.json
