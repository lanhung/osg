name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install locked-environment tool
        run: python -m pip install uv==0.8.24
      - name: Sync locked scientific environment
        run: uv sync --locked --python ${{ matrix.python-version }}
      - name: Run dependency-free foundation tests
        run: python -m unittest discover -s tests -p 'test_*.py'
      - name: Run complete locked-environment tests
        run: uv run pytest -q
      - name: Run Ruff lint and format checks
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Compile source tree
        run: python -m compileall -q src tests scripts
      - name: Validate registered experiment metadata and checksums
        run: python scripts/validate_experiment_registry.py
