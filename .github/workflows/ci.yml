name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run dependency-free foundation tests
        run: python -m unittest discover -s tests -p 'test_*.py'
      - name: Compile source tree
        run: python -m compileall -q src tests scripts
      - name: Validate registered experiment metadata and checksums
        run: python scripts/validate_experiment_registry.py
